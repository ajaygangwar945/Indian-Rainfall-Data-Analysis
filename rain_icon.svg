<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1f5fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Cloud -->
  <path fill="url(#cloudGrad)" filter="url(#glow)" d="M400,192c0-88.4-71.6-160-160-160c-63.8,0-118.9,37.5-146.2,91.9C90.3,124.6,88,124.5,85.6,124.5C38.3,124.5,0,162.8,0,210.1c0,47.3,38.3,85.6,85.6,85.6h314.4c61.9,0,112-50.1,112-112S461.9,192,400,192z"/>
  
  <!-- Rain Drops -->
  <g transform="translate(0, 50)">
    <path fill="url(#rainGrad)" opacity="0.8" d="M120,320c-8,0-15,8-15,18s5,25,15,25s15-15,15-25S128,320,120,320z">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 100" dur="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="1s" repeatCount="indefinite" />
    </path>
    <path fill="url(#rainGrad)" opacity="0.6" d="M200,340c-6,0-12,7-12,15s4,20,12,20s12-12,12-20S206,340,200,340z">
       <animateTransform attributeName="transform" type="translate" values="0 0; 0 100" dur="1.2s" begin="0.3s" repeatCount="indefinite" />
       <animate attributeName="opacity" values="0.6;0" dur="1.2s" begin="0.3s" repeatCount="indefinite" />
    </path>
    <path fill="url(#rainGrad)" opacity="0.9" d="M280,310c-9,0-16,9-16,20s6,28,16,28s16-17,16-28S289,310,280,310z">
       <animateTransform attributeName="transform" type="translate" values="0 0; 0 120" dur="0.8s" begin="0.1s" repeatCount="indefinite" />
       <animate attributeName="opacity" values="0.9;0" dur="0.8s" begin="0.1s" repeatCount="indefinite" />
    </path>
    <path fill="url(#rainGrad)" opacity="0.7" d="M360,330c-7,0-13,8-13,16s5,22,13,22s13-14,13-22S367,330,360,330z">
       <animateTransform attributeName="transform" type="translate" values="0 0; 0 100" dur="1.1s" begin="0.5s" repeatCount="indefinite" />
       <animate attributeName="opacity" values="0.7;0" dur="1.1s" begin="0.5s" repeatCount="indefinite" />
    </path>
    <path fill="url(#rainGrad)" opacity="0.8" d="M440,320c-8,0-15,8-15,18s5,25,15,25s15-15,15-25S448,320,440,320z">
       <animateTransform attributeName="transform" type="translate" values="0 0; 0 100" dur="1.3s" begin="0.2s" repeatCount="indefinite" />
       <animate attributeName="opacity" values="0.8;0" dur="1.3s" begin="0.2s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
